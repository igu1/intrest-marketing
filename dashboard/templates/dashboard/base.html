{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShopPulse Dashboard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #0D9488;
            --primary-light: #14B8A6;
            --primary-dark: #0F766E;
            --sidebar-bg: #0F172A;
            --sidebar-hover: #1E293B;
            --sidebar-active: #0D9488;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --text: #0F172A;
            --text-secondary: #64748B;
            --text-light: #94A3B8;
            --border: #E2E8F0;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --radius: 16px;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.06);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 260px; height: 100vh;
            background: var(--sidebar-bg);
            z-index: 1000;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-brand {
            padding: 28px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .sidebar-brand .logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            font-weight: 700;
        }

        .sidebar-brand h2 {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .sidebar-brand span {
            color: var(--text-light);
            font-size: 12px;
            display: block;
            margin-top: 2px;
        }

        .sidebar-nav { padding: 20px 14px; flex: 1; }

        .nav-section {
            margin-bottom: 8px;
            color: var(--text-light);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 8px 14px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 16px;
            border-radius: 10px;
            color: #94A3B8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            margin-bottom: 2px;
        }

        .nav-item i { width: 20px; text-align: center; font-size: 16px; }

        .nav-item:hover {
            background: var(--sidebar-hover);
            color: #fff;
        }

        .nav-item.active {
            background: var(--sidebar-active);
            color: #fff;
            box-shadow: 0 0 20px rgba(13,148,136,0.25);
        }

        .nav-item .badge {
            margin-left: auto;
            background: var(--danger);
            color: #fff;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: 600;
        }

        /* ─── Main ─── */
        .main {
            margin-left: 260px;
            min-height: 100vh;
            transition: var(--transition);
        }

        /* ─── Navbar ─── */
        .navbar {
            background: var(--surface);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .navbar-left { display: flex; align-items: center; gap: 16px; }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: var(--transition);
        }
        .menu-toggle:hover { background: var(--bg); }

        .navbar-search {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg);
            padding: 10px 16px;
            border-radius: 10px;
            min-width: 280px;
            border: 1px solid var(--border);
        }

        .navbar-search i { color: var(--text-light); }

        .navbar-search input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: var(--text);
            width: 100%;
            font-family: inherit;
        }

        .navbar-right { display: flex; align-items: center; gap: 12px; }

        .nav-icon-btn {
            width: 40px; height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
            position: relative;
        }
        .nav-icon-btn:hover { background: var(--bg); color: var(--primary); }

        .nav-icon-btn .dot {
            position: absolute;
            top: 8px; right: 8px;
            width: 8px; height: 8px;
            background: var(--danger);
            border-radius: 50%;
            border: 2px solid var(--surface);
        }

        .avatar {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        /* ─── Content ─── */
        .content { padding: 32px; }

        /* ─── Cards ─── */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: fadeUp 0.5s ease both;
            border: 1px solid var(--border);
        }

        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.2s; }
        .stat-card:nth-child(4) { animation-delay: 0.3s; }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: transparent;
        }

        .stat-card .stat-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .stat-card .stat-icon.teal { background: #CCFBF1; color: var(--primary); }
        .stat-card .stat-icon.green { background: #D1FAE5; color: var(--success); }
        .stat-card .stat-icon.red { background: #FEE2E2; color: var(--danger); }
        .stat-card .stat-icon.blue { background: #DBEAFE; color: var(--info); }

        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h3 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .card-body { padding: 24px; }

        /* ─── Table ─── */
        .table-wrapper { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
        }

        table th {
            background: var(--bg);
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        table td { border-bottom: 1px solid var(--border); color: var(--text); }

        table tr:last-child td { border-bottom: none; }

        table tr:hover td { background: var(--bg); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.completed { background: #D1FAE5; color: #059669; }
        .status-badge.sending { background: #DBEAFE; color: #2563EB; }
        .status-badge.draft { background: #F1F5F9; color: #64748B; }
        .status-badge.failed { background: #FEE2E2; color: #DC2626; }

        /* ─── Form ─── */
        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .form-group .hint {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }

        textarea, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            transition: var(--transition);
            background: var(--surface);
            outline: none;
        }

        textarea:focus, input[type="text"]:focus, input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
        }

        textarea { resize: vertical; min-height: 120px; }

        .file-upload {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .file-upload:hover {
            border-color: var(--primary);
            background: rgba(13,148,136,0.02);
        }

        .file-upload input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload i {
            font-size: 32px;
            color: var(--primary-light);
            margin-bottom: 8px;
        }

        .file-upload p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .file-upload .file-name {
            margin-top: 8px;
            color: var(--primary);
            font-weight: 600;
            font-size: 13px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 4px 12px rgba(13,148,136,0.25);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(13,148,136,0.35);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { background: var(--bg); }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* ─── Progress ─── */
        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: var(--bg);
            border-radius: 99px;
            overflow: hidden;
            margin-top: 16px;
            display: none;
        }

        .progress-bar-container.active { display: block; }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 99px;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* ─── Toast ─── */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.3s ease, fadeOut 0.3s ease 3.7s;
            min-width: 300px;
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.info { background: var(--info); }

        .toast.hiding { opacity: 0; transform: translateX(100px); }

        /* ─── Overlay ─── */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active { display: block; opacity: 1; }

        /* ─── Send Button ─── */
        .btn-send {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(13,148,136,0.2);
        }

        .btn-send:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(13,148,136,0.3);
            background: var(--primary-dark);
        }

        .btn-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .send-spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        .send-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .send-status.success {
            background: #F0FDF4;
            color: var(--success);
        }

        .send-status.error {
            background: #FEF2F2;
            color: var(--danger);
        }

        /* ─── Animations ─── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .fade-in { animation: fadeUp 0.5s ease both; }
        .fade-in-delay-1 { animation: fadeUp 0.5s ease 0.1s both; }
        .fade-in-delay-2 { animation: fadeUp 0.5s ease 0.2s both; }
        .fade-in-delay-3 { animation: fadeUp 0.5s ease 0.3s both; }

        /* ─── Responsive ─── */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .menu-toggle { display: flex; }
            .navbar-search { min-width: 200px; }
        }

        @media (max-width: 640px) {
            .content { padding: 20px 16px; }
            .navbar { padding: 12px 16px; }
            .stat-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .navbar-search { display: none; }
            .toast { min-width: auto; margin: 0 16px; }
            .toast-container { left: 0; right: 0; top: 16px; align-items: center; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="toast-container" id="toastContainer"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="logo"><i class="fas fa-bolt"></i></div>
            <div>
                <h2>ShopPulse</h2>
                <span>Marketing Platform</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">Main</div>
            <a href="{% url 'dashboard:home' %}" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a href="{% url 'dashboard:bulk_message' %}" class="nav-item {% if active_page == 'bulk_message' %}active{% endif %}">
                <i class="fas fa-paper-plane"></i> Bulk Message
            </a>
            <div class="nav-section" style="margin-top:16px;">Analytics</div>
            <a href="{% url 'dashboard:analytics' %}" class="nav-item {% if active_page == 'analytics' %}active{% endif %}">
                <i class="fas fa-chart-bar"></i> Analytics
            </a>
            <a href="{% url 'ecommerce:home' %}" class="nav-item" target="_blank">
                <i class="fas fa-store"></i> E-Commerce
            </a>
            <a href="{% url 'ecommerce:product_list' %}" class="nav-item" target="_blank">
                <i class="fas fa-box"></i> Products
            </a>
        </nav>
    </aside>

    <div class="main">
        <nav class="navbar">
            <div class="navbar-left">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="navbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search...">
                </div>
            </div>
            <div class="navbar-right">
                <button class="nav-icon-btn">
                    <i class="fas fa-bell"></i>
                    <span class="dot"></span>
                </button>
                <button class="nav-icon-btn">
                    <i class="fas fa-cog"></i>
                </button>
                <div class="avatar">S</div>
            </div>
        </nav>

        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const toggle = document.getElementById('menuToggle');

        toggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'check-circle', error: 'exclamation-circle', info: 'info-circle' };
            toast.innerHTML = `<i class="fas fa-${icons[type] || 'info-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let c of cookies) {
                    c = c.trim();
                    if (c.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(c.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        async function sendProductImage(chatId, productId, message, buttonEl) {
            if (!chatId || !productId) {
                showToast('Missing chat ID or product ID', 'error');
                return;
            }
            if (buttonEl) {
                buttonEl.disabled = true;
                const originalText = buttonEl.innerHTML;
                buttonEl.innerHTML = '<span class="send-spinner"></span> Sending...';
                try {
                    const resp = await fetch('/dashboard/send-product-image/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken'),
                        },
                        body: JSON.stringify({
                            chat_id: chatId,
                            product_id: productId,
                            message: message || '',
                        }),
                    });
                    const data = await resp.json();
                    if (data.ok) {
                        showToast('Product image sent successfully!', 'success');
                        buttonEl.innerHTML = '<i class="fas fa-check"></i> Sent';
                        setTimeout(() => { buttonEl.innerHTML = originalText; buttonEl.disabled = false; }, 2000);
                    } else {
                        showToast(data.error || 'Failed to send', 'error');
                        buttonEl.innerHTML = originalText;
                        buttonEl.disabled = false;
                    }
                } catch (e) {
                    showToast('Network error', 'error');
                    buttonEl.innerHTML = originalText;
                    buttonEl.disabled = false;
                }
            }
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
